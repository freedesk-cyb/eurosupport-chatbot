<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft Shadow -->
  <circle cx="200" cy="360" r="100" fill="url(#paint0_radial)" fill-opacity="0.2"/>
  
  <!-- Robot Body -->
  <circle cx="200" cy="200" r="160" fill="white" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- Antenna (Lightning) -->
  <path d="M200 40L220 70L200 70L220 100L180 60L200 60L180 40H200Z" fill="#00E676" stroke="#2E7D32" stroke-width="2" stroke-linejoin="round"/>
  
  <!-- Face Screen -->
  <rect x="100" y="140" width="200" height="120" rx="60" fill="#007BFF"/>
  
  <!-- Eyes -->
  <rect x="145" y="180" width="15" height="40" rx="7.5" fill="white"/>
  <rect x="240" y="180" width="15" height="40" rx="7.5" fill="white"/>

  <defs>
    <radialGradient id="paint0_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(200 360) rotate(90) scale(40 100)">
      <stop stop-color="black"/>
      <stop offset="1" stop-color="black" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
